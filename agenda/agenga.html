<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Agenda</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-image"></div>
    <div class="container">
        <div class="navigation">
            <button class="day-button active" id="day1">Day 1</button>
            <button class="day-button" id="day2">Day 2</button>
            <button class="day-button" id="day3">Day 3</button>
        </div>
        <div class="content">
            <div class="agenda">
                <h1>AGENDA</h1>
                <ul>
                    <li>Pitch-a-thon</li>
                    <li>Workshops</li>
                    <li>Keynote Speech</li>
                    <li>Quiz</li>
                    <li>Wonderverse</li>
                    <li>Product Showcase</li>
                </ul>
            </div>
            <div class="qr-section">
                <img src="qr.jpg" alt="QR Code">
                <p>   or   </p>
                <button class="register-button">LINK FOR REGISTRATION</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>

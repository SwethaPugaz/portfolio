<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovation Camp</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>INNOVATION CAMP</h1>
        </header>
        <div class="day-cards">
            <div class="card">
                <div class="card-header">
                    <h2>DAY 1</h2>
                </div>
                <p>Meet global leading investors, accelerators and corporates.</p>
                <div class="buttons">
                    <button class="register">REGISTER</button>
                    <button class="learn-more">Learn More</button>
                </div>
            </div>
            <div class="card">
                <div class="card-header">
                    <h2>DAY 2</h2>
                </div>
                <p>Ideate and co-innovate with corporates and homegrown players to fast-track your ideas into the markets.</p>
                <div class="buttons">
                    <button class="register">REGISTER</button>
                    <button class="learn-more">Learn More</button>
                </div>
            </div>
            <div class="card">
                <div class="card-header">
                    <h2>DAY 3</h2>
                </div>
                <p>Present to a global audience at the finals and win up to $1.2 million worth of grant prizes.</p>
                <div class="buttons">
                    <button class="register">REGISTER</button>
                    <button class="learn-more">Learn More</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
